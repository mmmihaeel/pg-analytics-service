services:
  app:
    build:
      context: .
      dockerfile: docker/go/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      APP_ENV: docker
      APP_AUTO_MIGRATE: "true"
      APP_AUTO_SEED: "true"
      APP_VERSION: local-dev
    command: ["go", "run", "./cmd/api"]
    working_dir: /app
    volumes:
      - ./:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pg_analytics
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d pg_analytics"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6383:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  go-mod-cache:
  go-build-cache:

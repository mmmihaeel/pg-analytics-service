		<text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Query</text>
	</g>
	<g transform="translate(520, 100)">
		<rect width="140" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
		<rect width="6" height="60" fill="#38BDF8" rx="3" />
		<text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Aggregate</text>
	</g>
	<g transform="translate(740, 100)">
		<rect width="140" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
		<rect width="6" height="60" fill="#A855F7" rx="3" />
		<text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Cache</text>
	</g>
	<g transform="translate(960, 100)">
		<rect width="140" height="60" fill="#1E293B" stroke="#10B981" stroke-width="1" rx="8" />
		<rect width="6" height="60" fill="#10B981" rx="3" />
		<text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Ready</text>
	</g>
	<g transform="translate(300, 220)">
		<rect width="140" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" stroke-dasharray="4,4" />
		<rect width="6" height="60" fill="#F97316" rx="3" />
		<text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Recompute</text>

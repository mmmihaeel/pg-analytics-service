<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
	<defs>
		<pattern id="lc-grid" width="40" height="40" patternUnits="userSpaceOnUse">
			<path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
		</pattern>
		<marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
			<path d="M 0 1 L 9 5 L 0 9 z" fill="#64748B" />
		</marker>
		<marker id="arrow-success" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
			<path d="M 0 1 L 9 5 L 0 9 z" fill="#10B981" />
		</marker>
		<marker id="arrow-recompute" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
			<path d="M 0 1 L 9 5 L 0 9 z" fill="#F97316" />
		</marker>
	</defs>
	<rect width="1280" height="320" fill="#0F172A" />
	<rect width="1280" height="320" fill="url(#lc-grid)" />
	<text x="80" y="50" fill="#94A3B8" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="1">LIFECYCLE AND RECOMPUTATION</text>
	<path d="M 220 130 L 290 130" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-neutral)" />
	<path d="M 440 130 L 510 130" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-neutral)" />
	<path d="M 660 130 L 730 130" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-neutral)" />
	<path d="M 880 130 L 950 130" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-success)" />
	<path d="M 370 220 L 370 160" stroke="#F97316" stroke-width="2" marker-end="url(#arrow-recompute)" />
	<path d="M 440 250 L 730 250" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-neutral)" />
	<g transform="translate(80, 100)">
		<rect width="140" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
		<rect width="6" height="60" fill="#38BDF8" rx="3" />
		<text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Request</text>
	</g>
	<g transform="translate(300, 100)">
